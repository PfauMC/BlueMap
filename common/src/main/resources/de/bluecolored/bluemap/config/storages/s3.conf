##                          ##
##         BlueMap          ##
##      Storage-Config      ##
##                          ##

# The storage-type of this storage.
# Depending on this setting, different config entries are allowed/expected in this config file.
# Don't change this value! If you want a different storage-type, check out the other example configs.
storage-type: s3

# The S3-compatible endpoint URL.
# AWS S3 (default):
#   endpoint: "https://s3.amazonaws.com"
# MinIO (self-hosted):
#   endpoint: "http://minio.example.com:9000"
# Cloudflare R2:
#   endpoint: "https://<account-id>.r2.cloudflarestorage.com"
# Backblaze B2:
#   endpoint: "https://s3.us-west-002.backblazeb2.com"
endpoint: "https://s3.amazonaws.com"

# The AWS region (or equivalent for other providers).
# AWS:   set to the region your bucket is in, e.g. "eu-central-1"
# MinIO: any non-empty string is accepted, e.g. "us-east-1"
# Cloudflare R2: use the literal string "auto"
# Backblaze B2: use the region shown in your B2 bucket endpoint, e.g. "us-west-002"
region: "us-east-1"

# The name of the bucket to store BlueMap data in.
bucket: ""

# Optional key prefix inside the bucket. Useful when sharing a bucket with other data.
# Example: prefix: "bluemap/"
# Default is empty (objects are stored at the bucket root).
prefix: ""

# Your S3 access key ID.
# For security, consider injecting this value at the deployment layer rather than storing it here.
access-key: ""

# Your S3 secret access key.
# For security, consider injecting this value at the deployment layer rather than storing it here.
secret-key: ""

# Whether to use path-style access instead of virtual-hosted-style access.
# AWS S3:        false  (virtual-hosted-style is preferred)
# MinIO:         true   (path-style is required for most MinIO setups)
# Cloudflare R2: false
# Backblaze B2:  false
path-style-access: false

# Maximum number of retry attempts on transient failures (5xx, network errors).
# Default is: 3
max-retries: 3

# Maximum backoff cap in milliseconds for exponential retry backoff.
# Default is: 10000
retry-cap-ms: 10000

# TCP connection timeout in milliseconds.
# Default is: 10000
connect-timeout-ms: 10000

# Per-request timeout in milliseconds (applies after the connection is established).
# Default is: 30000
request-timeout-ms: 30000

# The compression type that BlueMap will use to compress generated map data.
# Available compression types are:
#  - gzip
#  - zstd
#  - deflate
#  - none
# The default is: gzip
compression: gzip
